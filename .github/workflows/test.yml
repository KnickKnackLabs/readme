name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GH_TOKEN: ${{ github.token }}
  GITHUB_TOKEN: ${{ github.token }}
  MISE_JOBS: 1

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Check whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi

      - name: Run tests
        run: mise run test

      - name: Run codebase lints
        run: codebase lint "$PWD"

      - name: Check README.md is up to date
        uses: KnickKnackLabs/readme@v0.3.1
        with:
          check: true
