[tools]
# ── Generated by template-conventions ──
jq = "latest"
gum = "0.17.0"
bats = "1.13.0"
usage = "1"

# ── Add repo-specific tools below ──
bun = "1"

[settings]
quiet = true
task_output = "interleave"
experimental = true

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv"

[_.codebase]
lint = [
  "mise-settings",
  "bats-test-helper",
  "bats-test-task",
  "mcr-scope",
  "or-true",
  "shellcheck",
  "gum-table",
  "caller-pwd-contract",
  "github-actions",
]
